services:
  routeros:
    image: dharma007/mikrotik-cloud
    container_name: mikrotik-chr
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:rslave
    ports:
      - "2222:22"
      - "2223:23"
      - "7777:80"
      - "8728:8728"
      - "8729:8729"
      - "8291:8291"
    networks:
      - mikrotik-net

  router-proxy:
    image: nginx:alpine
    container_name: router-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
      - "8081:8081"
      - "19090:19090"
    networks:
      - mikrotik-net
    depends_on:
      - routeros

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - mikrotik-net
    depends_on:
      - router-proxy

networks:
  mikrotik-net:
    name: mikrotik-net
    driver: bridge
