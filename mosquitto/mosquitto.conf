# =============================================================================
# Mosquitto MQTT Broker — optimized untuk 2GB RAM
# =============================================================================

# Listener plain MQTT (dalam WireGuard tunnel, tidak perlu TLS tambahan)
listener 1883
protocol mqtt

# Listener WebSocket (untuk dashboard/monitoring via browser)
listener 9001
protocol websockets

# Autentikasi wajib
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence — simpan message saat broker restart
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Autosave setiap 60 detik
autosave_interval 60

# Queue message maksimum per client
max_queued_messages 1000

# Batas koneksi — hemat RAM di VPS 2GB
max_connections 100

# Logging ke stdout (Docker)
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Keepalive
keepalive_interval 60

# Message size maksimum 5MB (cukup untuk data scraping)
message_size_limit 5242880
