user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

# ─────────────────────────────────────────────
# TCP passthrough — Winbox, API, SSH, Telnet
# (port ini langsung di-expose dari routeros container,
#  blok stream ini untuk referensi jika ingin route via nginx)
# ─────────────────────────────────────────────
stream {
    log_format stream '$remote_addr [$time_local] $protocol $status '
                      '$bytes_sent $bytes_received $session_time';
    access_log /var/log/nginx/stream.log stream;

    upstream mikrotik_api {
        server routeros:8728;
    }
    upstream mikrotik_api_ssl {
        server routeros:8729;
    }
    upstream mikrotik_winbox {
        server routeros:8291;
    }

    server {
        listen 8728;
        proxy_pass mikrotik_api;
        proxy_timeout 30s;
        proxy_connect_timeout 5s;
    }

    server {
        listen 8729;
        proxy_pass mikrotik_api_ssl;
        proxy_timeout 30s;
        proxy_connect_timeout 5s;
    }

    server {
        listen 8291;
        proxy_pass mikrotik_winbox;
        proxy_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

# ─────────────────────────────────────────────
# HTTP — WebFig, REST API MikroTik, gRPC proxy
# ─────────────────────────────────────────────
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── WebFig (MikroTik web interface) ──────────────────
    server {
        listen 8080;
        listen 19090;
        server_name _;

        location / {
            proxy_pass http://routeros:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }

    # ── MikroTik REST API ─────────────────────────────────
    server {
        listen 8081;
        server_name _;

        location / {
            proxy_pass http://routeros:80/rest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }
    }

    # ── gRPC Orchestrator proxy ───────────────────────────
    # Accessible via WireGuard: 10.10.0.1:50051
    server {
        listen 50051 http2;
        server_name _;

        location / {
            grpc_pass grpc://grpc-server:9090;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;

            # Timeout untuk long-running scraping jobs
            grpc_read_timeout 120s;
            grpc_send_timeout 120s;

            # Error handling
            error_page 502 = /error502grpc;
        }

        location = /error502grpc {
            internal;
            default_type application/grpc;
            add_header grpc-status 14;
            add_header content-length 0;
            return 204;
        }
    }
}
