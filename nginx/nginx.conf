user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# TCP passthrough — Winbox, API, SSH, Telnet
stream {
    log_format stream '$remote_addr [$time_local] $protocol $status '
                      '$bytes_sent $bytes_received $session_time';
    access_log /var/log/nginx/stream.log stream;

    upstream mikrotik_ssh {
        server routeros:22;
    }
    upstream mikrotik_telnet {
        server routeros:23;
    }
    upstream mikrotik_winbox {
        server routeros:8291;
    }
    upstream mikrotik_api {
        server routeros:8728;
    }
    upstream mikrotik_api_ssl {
        server routeros:8729;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Webfig — MikroTik web interface
    server {
        listen 8080;
        listen 19090;
        server_name _;

        location / {
            proxy_pass http://routeros:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }

    # REST API MikroTik
    server {
        listen 8081;
        server_name _;

        location / {
            proxy_pass http://routeros:80/rest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
