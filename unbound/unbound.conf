server:
    verbosity: 1
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Hanya terima query dari Docker network + WireGuard tunnel
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 172.20.0.0/24 allow
    access-control: 10.10.0.0/24 allow

    # Keamanan DNSSEC
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: no

    # Randomisasi DNS query
    use-caps-for-id: yes
    qname-minimisation: yes

    # Sembunyikan versi & identitas
    hide-identity: yes
    hide-version: yes

    # Cache — efisien untuk 2GB RAM
    cache-min-ttl: 3600
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes

    # Thread — 1 cukup untuk VPS 2 core (biarkan core lain untuk service lain)
    num-threads: 1
    msg-cache-slabs: 1
    rrset-cache-slabs: 1
    infra-cache-slabs: 1
    key-cache-slabs: 1

    # Memory — hemat RAM
    msg-cache-size: 32m
    rrset-cache-size: 64m
    neg-cache-size: 4m

    # Privacy — jangan kirim hostname ke root server
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8

    # Root hints (sudah disertakan di image mvance/unbound)
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    # Logging minimal
    log-queries: no
    log-replies: no
